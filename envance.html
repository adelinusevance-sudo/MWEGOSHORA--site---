<!DOCTYPE html>
<html lang="en">
<head>
  <title>P3 Graphics – Sign In</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family:Arial, sans-serif;
      background-color: #2b2b2b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Outer card (dark grey shell) ── */
    .card {
      background-color: #3a3a3a;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    /* ── Card header bar ── */
    .card-header {
      background-color: #2a2a2a;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header .title {
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
    }

    /* P3 logo badge */
    .logo-badge {
      border: 2px solid #fff;
      color: #fff;
      font-weight: 900;
      font-size: 0.85rem;
      padding: 3px 6px;
      letter-spacing: 1px;
      border-radius: 4px;
    }

    /* ── Main form section ── */
    .form-section {
      background-color: #1e1e1e;
      margin: 12px;
      border-radius: 12px;
      padding: 24px 20px;
    }

    .form-section h2 {
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* ── Inputs ── */
    .input-group {
      position: relative;
      margin-bottom: 14px;
    }

    .input-group .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      font-size: 1rem;
      pointer-events: none;
    }

    .input-group input {
      width: 100%;
      background-color: #2b2b2b;
      border: 1px solid #444;
      border-radius: 8px;
      color: #ccc;
      padding: 13px 44px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input::placeholder { color: #666; }
    .input-group input:focus { border-color: #ff5500; }

    /* Eye toggle for password */
    .toggle-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
    }

    /* ── Checkbox ── */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #ff5500;
      cursor: pointer;
    }

    .checkbox-row label {
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* ── Sign in button ── */
    .btn-signin {
      display: block;
      width: 100%;
      background-color: #ff5500;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-signin:hover { background-color: #e04a00; }

    /* ── Forgot links ── */
    .forgot-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
      font-size: 0.83rem;
    }

    .forgot-row a {
      color: #ff5500;
      text-decoration: underline;
    }

    .forgot-row span { color: #888; }

    /* ── Social icons bar ── */
    .social-bar {
      background-color: #1e1e1e;
      margin: 0 12px 12px;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    .social-bar a {
      color: #ccc;
      font-size: 1.2rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .social-bar a:hover { color: #ff5500; }

    /* SVG icon helpers */
    .social-bar svg { width: 22px; height: 22px; fill: currentColor; }

    /* ── Footer bar ── */
    .card-footer {
      background-color: #1e1e1e;
      margin: 0 12px 12px;
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.82rem;
    }

    .card-footer p { color: #aaa; }

    .card-footer a {
      color: #ff5500;
      text-decoration: underline;
    }

    .card-footer .tiktok {
      color: #aaa;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>

    <!-- Header -->
    <div class="card-header">
      <span class="title">Sign in</span>
      <span class="logo-badge">P3</span>
    </div>

    <!-- Form Section -->
    <div class="form-section">
      <h2>P3 Graphics Login</h2>

      <!-- Username -->
      <div class="input-group">
        <span class="icon">&#128100;</span>
        <input type="text" placeholder="Username" autocomplete="username" />
      </div>

      <!-- Password -->
      <div class="input-group">
        <span class="icon">&#128274;</span>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
        <button class="toggle-eye" onclick="togglePassword()" aria-label="Show/hide password">&#128065;</button>
      </div>

      <!-- Keep me signed in -->
      <div class="checkbox-row">
        <input type="checkbox" id="keep" />
        <label for="keep">Keep me signed in</label>
      </div>

      <!-- Sign in button -->
      <button class="btn-signin">Sign in</button>

      <!-- Forgot links -->
      <div class="forgot-row">
        <a href="#">Forgot Username?</a>
        <span>or</span>

    <div class="card-footer">
      <p>Don't have an account? <a href="#">Create account</a></p>
      <span class="tiktok">♪ @prestigepixelpro</span>
    </div>

  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
